<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Crazy Vision — Professional Photography Services{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  {% block head %}{% endblock %}
</head>
<body>

<nav>
  <a href="/" class="nav-brand">CRAZY<span>VISION</span></a>
  <a href="tel:+9731878494"class="nav-brand">📞 Contact Now</a>
  <div class="nav-right">
    <a href="/" class="nav-link">Home</a>
    <a href="/services" class="nav-link">Services</a>
    <a href="/gallery" class="nav-link">Gallery</a>
    <a href="/reviews" class="nav-link">Reviews</a>
    <a href="/admin" class="nav-link">Admin</a>
    <div class="theme-toggle-wrap">
      <span class="theme-toggle-label" id="theme-label">DARK</span>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"></button>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<footer>
  <div class="container">
    © 2025 Crazy Vision · Professional Photography Services · Ballari, Karnataka · All rights reserved
  </div>
</footer>

<script>
  // Theme persistence
  const root = document.documentElement;
  const toggle = document.getElementById('themeToggle');
  const label = document.getElementById('theme-label');
  const saved = localStorage.getItem('crazyvision-theme') || 'dark';
  root.setAttribute('data-theme', saved);
  label.textContent = saved.toUpperCase();

  toggle.addEventListener('click', () => {
    const current = root.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    localStorage.setItem('crazyvision-theme', next);
    label.textContent = next.toUpperCase();
  });
</script>
{% block scripts %}{% endblock %}
</body>
</html>
